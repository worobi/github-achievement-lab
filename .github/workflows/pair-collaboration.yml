name: Pair collaboration exercise

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-coauthored-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the workflow lab
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Generate a co-authored collaboration record
        shell: bash
        run: |
          set -euo pipefail
          git switch -c pair-extraordinaire-automation
          mkdir -p docs
          {
            echo "# Human and automation collaboration"
            echo
            echo "This record was generated by GitHub Actions from a workflow designed and initiated by Brandon Worobi."
            echo
            echo "- Human contribution: workflow intent, structure, and approval"
            echo "- Automation contribution: repeatable generation and Git commit"
          } > docs/automation-collaboration.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/automation-collaboration.md
          git commit -m "Add automation collaboration record" -m "Co-authored-by: Brandon Worobi <176239212+worobi@users.noreply.github.com>"
          git push --set-upstream origin pair-extraordinaire-automation
